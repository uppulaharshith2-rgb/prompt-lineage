name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q

      - name: Run example end-to-end
        # Build the example, assert the static site has the files we promise.
        run: |
          prompt-lineage build examples/ --out /tmp/lineage-site
          test -f /tmp/lineage-site/index.html
          test -f /tmp/lineage-site/lineage.json
          test -f /tmp/lineage-site/style.css
          test -d /tmp/lineage-site/prompts
          grep -q "prompts/support_triage.md" /tmp/lineage-site/index.html
          grep -q "claude-sonnet-4-6" /tmp/lineage-site/index.html
